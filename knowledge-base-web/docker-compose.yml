services:
  kb-notes-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: kb-notes-web:local
    container_name: kb-notes-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
    ports:
      - "10.0.0.52:${HOST_BIND_PORT:-3002}:${PORT:-3000}"
    volumes:
      - ../knowledge-base:/knowledge-base:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${PORT:-3000}/notes/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
