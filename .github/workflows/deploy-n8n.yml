name: Deploy n8n workflows

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-n8n-workflows
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Configure SSH
        shell: bash
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy workflows over SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_REPO_PATH: ${{ secrets.VPS_REPO_PATH }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key \
            -p "$VPS_SSH_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            "VPS_REPO_PATH=$(printf '%q' "$VPS_REPO_PATH") bash -s" <<'EOF'
          set -euo pipefail

          case "$VPS_REPO_PATH" in
            "~")
              repo_path="$HOME"
              ;;
            "~/"*)
              repo_path="$HOME/${VPS_REPO_PATH#~/}"
              ;;
            *)
              repo_path="$VPS_REPO_PATH"
              ;;
          esac

          if [ ! -d "$repo_path/.git" ]; then
            echo "Repository not found on VPS. Check the VPS_REPO_PATH secret." >&2
            echo "Expected a Git repository at: $repo_path" >&2
            exit 1
          fi

          cd "$repo_path"
          if [ ! -w .git/objects ]; then
            echo "The deploy user cannot write to .git/objects on the VPS." >&2
            echo "Fix the repository ownership/permissions for the VPS_USER before running deploy again." >&2
            exit 1
          fi

          git pull --ff-only origin main
          bash scripts/deploy-n8n-workflows.sh
          EOF
