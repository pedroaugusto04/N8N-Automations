services:
  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:latest}
    restart: ${N8N_RESTART_POLICY:-always}
    ports:
      - "${N8N_BIND_PORT:-5678}:${N8N_PORT:-5678}"
    extra_hosts:
      - "host.docker.internal:${HOST_DOCKER_INTERNAL_IP}"
    networks:
      - wander-net
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PATH: ${N8N_PATH:-/n8n/}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS:-1}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      NODES_EXCLUDE: ${NODES_EXCLUDE:-[]}

    volumes:
      - ${N8N_DATA_DIR:-../n8n-private/data}:/home/node/.n8n
      - ./knowledge-base:/home/node/knowledge-base:ro
      - ../knowledge-vault:/home/node/knowledge-vault

  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: always
    ports:
      - "${EVOLUTION_API_PORT:-8081}:8080"
    networks:
      - wander-net
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      SERVER_URL: ${EVOLUTION_API_PUBLIC_URL:-http://localhost:8081}
      DATABASE_ENABLED: ${EVOLUTION_API_DATABASE_ENABLED:-true}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_API_DATABASE_CONNECTION_URI}
      CACHE_REDIS_ENABLED: "false"
      LOG_LEVEL: INFO
      DEL_INSTANCE: "false"
      WEBHOOK_GLOBAL_ENABLED: ${WEBHOOK_GLOBAL_ENABLED:-true}
      WEBHOOK_GLOBAL_URL: ${WEBHOOK_GLOBAL_URL}
      TZ: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ./evolution-data:/evolution/instances


networks:
  wander-net:
    external: true
    name: wander-rag_default

