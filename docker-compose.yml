services:
  kb-agent-server:
    build:
      context: ./knowledge-base
      dockerfile: Dockerfile.kb-agent
    image: kb-agent-server:local
    restart: always
    env_file:
      - .env
    environment:
      HOME: /home/node
      TZ: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
      KB_OPENCODE_MODEL: ${KB_OPENCODE_MODEL}
      KB_AGENT_SERVER_HOST: 0.0.0.0
      KB_AGENT_SERVER_PORT: 8787
      KB_AGENT_COMMAND: /home/node/knowledge-base/kb-agent
      KB_AGENT_ENV_FILE: /home/node/knowledge-base/.env.kb-agent
      KB_AGENT_SERVER_ENV_FILE: /home/node/knowledge-base/.env.kb-agent-server
    ports:
      - "8787:8787"
    volumes:
      - ./knowledge-base:/home/node/knowledge-base:ro
      - ../knowledge-vault:/home/node/knowledge-vault
      - kb-agent-opencode-share:/home/node/.local/share/opencode
      - /home/ubuntu/.config/opencode:/home/node/.config/opencode
      - /home/ubuntu/.cache/opencode:/home/node/.cache/opencode
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:latest}
    restart: ${N8N_RESTART_POLICY:-always}
    ports:
      - "${N8N_BIND_PORT:-5678}:${N8N_PORT:-5678}"
    extra_hosts:
      - "host.docker.internal:${HOST_DOCKER_INTERNAL_IP}"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PATH: ${N8N_PATH:-/n8n/}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS:-1}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      NODES_EXCLUDE: ${NODES_EXCLUDE:-[]}

    volumes:
      - ${N8N_DATA_DIR:-../n8n-private/data}:/home/node/.n8n
      - ./knowledge-base:/home/node/knowledge-base:ro
      - ../knowledge-vault:/home/node/knowledge-vault

volumes:
  kb-agent-opencode-share:
